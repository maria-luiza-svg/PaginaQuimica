<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Gás Ideal</title>
</head>
<body>
    <h1>Lei dos Gás Ideais</h1>
    <p>Calcula o <strong>volume (V)</strong> em Litros.</p>
    
    <label for="pressao">Pressão (atm):</label>
    <input type="number" id="pressao" placeholder="Insira a pressão (atm)...">
    
    <label for="mol">Quantidade de mols (n):</label>
    <input type="number" id="mol" placeholder="Insira n (mol)...">
    
    <label for="temperatura">Temperatura (K):</label>
    <input type="number" id="temperatura" placeholder="Insira T (K)...">
    
    <button onclick="calcular()">Calcular Volume</button>
    
    <div id="resultado">Resultado</div>

    <script src="script.js"></script>
</body>
</html>
